<svg width="1400" height="1000" viewBox="0 0 1400 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#0B0D12"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#606873"/>
      <stop offset="50%" stop-color="#3B414A"/>
      <stop offset="100%" stop-color="#242931"/>
    </linearGradient>
    <linearGradient id="metalMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E8896"/>
      <stop offset="40%" stop-color="#545D68"/>
      <stop offset="100%" stop-color="#2B313A"/>
    </linearGradient>
    <linearGradient id="metalLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A6B0BC"/>
      <stop offset="100%" stop-color="#5B6572"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#6EF3A5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1C7E4F" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="1000" fill="url(#bgGrad)"/>

  <!-- Base -->
  <g filter="url(#shadow)">
    <rect x="320" y="800" width="760" height="90" rx="28" fill="url(#metalDark)"/>
    <rect x="360" y="770" width="680" height="45" rx="20" fill="url(#metalMid)"/>
  </g>

  <!-- Arm -->
  <path d="M450 790C430 600 520 420 700 340C830 282 936 310 1028 390L965 455C885 390 814 375 728 413C608 466 550 596 566 790H450Z" fill="url(#metalDark)"/>

  <!-- Stage -->
  <g filter="url(#shadow)">
    <rect x="650" y="585" width="330" height="80" rx="16" fill="url(#metalMid)"/>
    <rect x="675" y="605" width="280" height="42" rx="10" fill="#1A1F27"/>
    <circle cx="810" cy="626" r="20" fill="url(#glass)"/>
  </g>

  <!-- Objective turret -->
  <g filter="url(#shadow)">
    <circle cx="760" cy="510" r="72" fill="url(#metalLight)"/>
    <circle cx="760" cy="510" r="42" fill="#222831"/>
    <rect x="702" y="440" width="20" height="82" rx="8" transform="rotate(-34 702 440)" fill="url(#metalDark)"/>
    <rect x="750" y="430" width="20" height="92" rx="8" transform="rotate(0 750 430)" fill="url(#metalDark)"/>
    <rect x="805" y="440" width="20" height="82" rx="8" transform="rotate(33 805 440)" fill="url(#metalDark)"/>
  </g>

  <!-- Body tube -->
  <g filter="url(#shadow)">
    <rect x="700" y="255" width="120" height="235" rx="20" fill="url(#metalMid)"/>
    <rect x="725" y="275" width="70" height="195" rx="14" fill="#2B313A"/>
  </g>

  <!-- Ocular head -->
  <g filter="url(#shadow)">
    <rect x="620" y="175" width="280" height="78" rx="24" fill="url(#metalDark)"/>
    <rect x="645" y="100" width="75" height="95" rx="20" fill="url(#metalMid)"/>
    <rect x="800" y="100" width="75" height="95" rx="20" fill="url(#metalMid)"/>
    <ellipse cx="682" cy="104" rx="38" ry="13" fill="#10141B"/>
    <ellipse cx="837" cy="104" rx="38" ry="13" fill="#10141B"/>
  </g>

  <!-- Focus knobs -->
  <g filter="url(#shadow)">
    <circle cx="575" cy="540" r="55" fill="url(#metalLight)"/>
    <circle cx="575" cy="540" r="28" fill="#262D36"/>
    <circle cx="595" cy="565" r="28" fill="url(#metalDark)"/>
    <circle cx="595" cy="565" r="12" fill="#262D36"/>
  </g>

  <!-- Light source -->
  <g filter="url(#shadow)">
    <rect x="690" y="705" width="220" height="58" rx="18" fill="url(#metalMid)"/>
    <ellipse cx="800" cy="734" rx="58" ry="18" fill="url(#glass)"/>
  </g>

  <!-- Subtle labels (optional for onboarding hotspot references) -->
  <g font-family="Inter, Arial, sans-serif" font-size="20" fill="#D8DEE8" opacity="0.9">
    <text x="610" y="78">Oculars</text>
    <text x="915" y="505">Objectives</text>
    <text x="990" y="620">Stage</text>
    <text x="520" y="630">Focus</text>
    <text x="930" y="740">Illumination</text>
  </g>

  <!-- Guide lines -->
  <g stroke="#8FA0B7" stroke-width="2" opacity="0.45">
    <line x1="665" y1="83" x2="680" y2="130"/>
    <line x1="958" y1="495" x2="835" y2="503"/>
    <line x1="1030" y1="612" x2="955" y2="620"/>
    <line x1="560" y1="622" x2="586" y2="581"/>
    <line x1="1020" y1="734" x2="900" y2="734"/>
  </g>
</svg>
